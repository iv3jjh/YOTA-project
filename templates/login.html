<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Login - DYM Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0c0052;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: rgb(20, 151, 228);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #000000;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #0056b3;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>📻 DYM Manager</h2>
        <!-- Inizio controllo errore -->
        {% if errore %}
            <div style="background-color: #ffdddd; color: #d8000c; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #d8000c;">
                ⚠️ {{ errore }}
            </div>
        {% endif %}
        <form action="/" method="POST">
            <label for="nominativo">Personal Call</label>
            <input type="text" id="nominativo" name="nominativo" placeholder="Insert personal call" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Insert password" required>

            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
